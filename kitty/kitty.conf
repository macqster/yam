# Minimal Kitty config for the Fastfetch + Chafa startup scene.

font_family      JetBrainsMono NFM
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

cursor_shape     block
cursor_blink_interval 0
window_padding_width 18
background_opacity 0.9
window_border_width 0.5pt
draw_minimal_borders yes
draw_window_borders_for_single_window yes
active_border_color #473a2b
inactive_border_color #473a2b

remember_window_size no
initial_window_width 108c
initial_window_height 32c

scrollback_lines 10000
enable_audio_bell no
visual_bell_duration 0.0
copy_on_select yes
strip_trailing_spaces smart
shell_integration enabled

macos_option_as_alt yes
macos_quit_when_last_window_closed no
macos_thicken_font 0
macos_titlebar_color background

map cmd+enter new_window
map cmd+shift+enter new_os_window
map cmd+t new_tab
map cmd+w close_window
map cmd+shift+w close_tab
map cmd+left previous_tab
map cmd+right next_tab
map cmd+d launch --location=vsplit
map cmd+shift+d launch --location=hsplit
map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0
map cmd+shift+g show_scrollback
map cmd+shift+o kitten hints --type=url

# BEGIN_KITTY_THEME
# Elemental
include current-theme.conf
# END_KITTY_THEME
